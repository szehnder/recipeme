services:
  recipeme:
    build: .
    ports:
      - "8090:8080"
    environment:
      - SPOONACULAR_API_KEY=${SPOONACULAR_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - RECIPEME_LLM_PROVIDER=${RECIPEME_LLM_PROVIDER:-}
      - RECIPEME_VAULT_PATH=/vault
      - RECIPEME_NO_BROWSER=1
      - RECIPEME_PORT=8080
    volumes:
      - ${RECIPEME_VAULT_PATH:-/home/szehnder/Documents/Personal}:/vault:rw
