<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RECIPEME</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div id="header">
    <div id="header-left">
      <h1>RECIPEME</h1>
      <div id="header-query"></div>
      <div id="header-terms"></div>
    </div>
    <div id="header-right">
      <button id="save-btn" class="save-btn" onclick="saveRecipes()">
        Save <span id="save-badge" class="hidden">0</span>
      </button>
    </div>
  </div>

  <div id="grid"></div>

  <div id="more-container">
    <button id="load-more-btn" onclick="loadMore()">Load 20 More</button>
  </div>

  <div id="success-overlay" class="hidden">
    <div id="success-box">
      <div id="success-title">Saved!</div>
      <div id="success-path"></div>
      <ul id="success-list"></ul>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
